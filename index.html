<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test 360 Naufal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; background: #000; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <script>
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "panorama.jpg", // Pastiin nama filenya sama persis!
            "autoLoad": true,
            "debug": true, // tambahin sementara
            "hotSpotDebug": true, // nampilin panel spot coordinate 
            "hotSpots": [
                {
                    "pitch": -10,
                    "yaw": 30,
                    "type": "info",
                    "text": "Tes koordinat"
                }
            ]
        });
    </script>
</body>
</html>
