<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaufalCV-3D</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <link rel="stylesheet" href="style.css"> 
    <style>
        #panorama { width: 100%; height: 100vh; background: #000; }
        body { margin: 0; overflow: hidden; }

        /* FIX: Styling buat Menu Debug F3 */
        #debug-menu {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-family: monospace;
            padding: 10px;
            pointer-events: none; /* Biar tetep bisa geser panorama */
            font-size: 13px;
        }

        /* FIX: Styling biar tombol F3 di UI ga kotak kecil gepeng */
        .pnlm-f3-button {
            width: 26px;
            height: 26px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex !important;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000;
        }
        .pnlm-f3-button:hover { background: #eee; }
    </style>
</head>
<body>
    <div id="panorama"></div>
    <script>
    const getTimeState = () => {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 11) return 'w1';
        if (hour >= 11 && hour < 16) return 'w2';
        if (hour >= 16 && hour < 19) return 'w3';
        return 'w4';
    };

    const state = getTimeState();

    // FIX: Pake window.viewer biar terbaca global oleh debug.js
    window.viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "pcroom",
            "hotSpotDebug": true, 
            "sceneFadeDuration": 1000,
            "autoLoad": true
        },

        "scenes": {
            "pcroom": {
    "title": "PC Room",
    "panorama": `assets/panorama/pcroom/${state}.webp`, 
    "hotSpots": [
        {
            "pitch": -5.05, // Koordinat ke arah Bedroom
            "yaw": 30.95,
            "type": "scene",
            "text": "Masuk ke Bedroom",
            "sceneId": "bedroom",
            "targetYaw": 0.88,   // Mengarahkan pandangan saat sampai di Bedroom
            "targetPitch": -4.48
        },
        {
            "pitch": -6.99, // Koordinat ke arah Enchanting Room
            "yaw": -30.14,
            "type": "scene",
            "text": "Turun ke Enchanting Room",
            "sceneId": "enchantroom",
            "targetYaw": 0.88,
            "targetPitch": -4.48
        }
    ]
},
            "pcroom": {
            "title": "Bedroom",
            "panorama": `assets/panorama/bedroom/${state}.webp`, 
            "hotSpots": [
                    { "pitch": -1, "yaw": 36, "type": "scene", "text": "Ke Ruang Enchant", "sceneId": "tropiroom" }
                ]
            },
                
            "tropiroom": {
                "title": "Trophy Room",
                "panorama": `assets/panorama/tropiroom/${state}.webp`,
                "hotSpots": [
                    { "pitch": -5, "yaw": 60, "type": "scene", "text": "Ke Ruang Enchant", "sceneId": "enchantroom" }
                ]
            },
            "enchantroom": {
                "title": "Enchanting Room",
                "panorama": `assets/panorama/enchantroom/${state}.webp`,
                "hotSpots": [
                    { "pitch": -5, "yaw": 0, "type": "scene", "text": "Balik ke PC Room", "sceneId": "pcroom" }
                ]
            }
        }
    });
    </script>
    <script src="debug.js"></script>
</body>
</html>
