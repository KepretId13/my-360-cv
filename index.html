<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaufalCV-3D</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <link rel="stylesheet" href="style.css"> 
    <style>
        #panorama { width: 100%; height: 100vh; background: #000; }
        body { margin: 0; overflow: hidden; }

        #debug-menu {
            position: absolute;
            top: 10px;
            left: 10px; 
            z-index: 9999;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            font-family: monospace;
            padding: 10px;
            pointer-events: none;
            font-size: 13px;
        }

        .pnlm-f3-button {
            width: 26px;
            height: 26px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex !important;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000;
        }
        .pnlm-f3-button:hover { background: #eee; }
    </style>
</head>
<body>
    <div id="panorama"></div>

    <div id="actionbar" style="
        position: absolute; 
        bottom: 25%; 
        left: 50%; 
        transform: translateX(-50%); 
        color: white; 
        font-family: 'Courier New', Courier, monospace; 
        font-weight: bold;
        text-shadow: 2px 2px #000;
        font-size: 1.5rem;
        z-index: 9999;
        pointer-events: none; 
        display: none;
        text-align: center;
        width: 80%;
    "></div>

    <script>
    const getTimeState = () => {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 11) return 'w1';
        if (hour >= 11 && hour < 16) return 'w2';
        if (hour >= 16 && hour < 19) return 'w3';
        return 'w4';
    };

    const state = getTimeState();

    window.viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "pcroom",
            "hotSpotDebug": true, 
            "sceneFadeDuration": 1000,
            "autoLoad": true
        },

        "scenes": {
            "pcroom": {
                "title": "PC Room",
                "panorama": `assets/panorama/pcroom/${state}.webp`, 
                "hotSpots": [
                    {
                        "pitch": -5.05,
                        "yaw": 30.95,
                        "type": "scene",
                        "text": "Masuk ke Bedroom",
                        "sceneId": "bedroom",
                        "targetYaw": 0.88,
                        "targetPitch": -4.48
                    },
                    {
                        "pitch": -6.99,
                        "yaw": -30.14,
                        "type": "scene",
                        "text": "Turun ke Enchanting Room",
                        "sceneId": "enchantroom",
                        "targetYaw": 0.88,
                        "targetPitch": -4.48
                    },
                    {
                        "pitch": -37.49, 
                        "yaw": 173.36,
                        "type": "info", 
                        "clickHandlerFunc": function() {
                            showActionBar([
                                "Ini PC-ku...",
                                "Tempat di mana aku editing atau ngoding...",
                                "Banyak skill baru yang aku pelajari di sini.",
                                "Termasuk web yang lagi lu liat sekarang!"
                            ]);
                        }
                    }
                ]
            },

            "bedroom": {
                "title": "Bedroom",
                "panorama": `assets/panorama/bedroom/${state}.webp`,
                "hotSpots": [
                    { 
                        "pitch": -8.14, 
                        "yaw": 18.83, 
                        "type": "scene", 
                        "text": "Balik ke PC Room", 
                        "sceneId": "pcroom" 
                    }
                ]
            },

            "enchantroom": {
                "title": "Enchanting Room",
                "panorama": `assets/panorama/enchantroom/${state}.webp`,
                "hotSpots": [
                    {
                        "pitch": 19.88, 
                        "yaw": 175.36,
                        "type": "scene",
                        "text": "Naik ke PC Room (Lt. 2)",
                        "sceneId": "pcroom",
                        "targetYaw": -30.14, 
                        "targetPitch": -6.99
                    },
                    {
                        "pitch": -12.39, 
                        "yaw": 130.53,
                        "type": "scene",
                        "text": "Ke Trophy Room (Lt. 1)",
                        "sceneId": "tropiroom",
                        "targetYaw": 60,    
                        "targetPitch": -5
                    }
                ]
            },

            "tropiroom": {
                "title": "Trophy Room",
                "panorama": `assets/panorama/tropiroom/${state}.webp`,
                "hotSpots": [
                    { 
                        "pitch": -5, 
                        "yaw": 60, 
                        "type": "scene", 
                        "text": "Ke Ruang Enchant", 
                        "sceneId": "enchantroom" 
                    }
                ]
            }
        }
    });

    // SISTEM DIALOG ANTI-SPAM
    let isDialogueRunning = false; 

    function showActionBar(texts) {
        if (isDialogueRunning) {
            console.log("Sabar, dialog lagi jalan..."); 
            return; 
        }

        isDialogueRunning = true; 
        const bar = document.getElementById('actionbar');
        bar.style.display = 'block';
        let index = 0;

        function nextText() {
            if (index < texts.length) {
                bar.innerText = texts[index];
                index++;
                setTimeout(nextText, 2500); 
            } else {
                bar.style.display = 'none';
                isDialogueRunning = false; 
            }
        }
        nextText();
    }
    </script>
    <script src="debug.js"></script>
</body>
</html>
