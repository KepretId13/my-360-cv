<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaufalCV-3D</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <link rel="stylesheet" href="style.css"> 
    <style>
        #panorama { width: 100%; height: 100vh; background: #000; }
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="panorama"></div>
         <script>
    // 1. Fungsi penentu waktu
    const getTimeState = () => {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 11) return 'w1';  // Pagi
        if (hour >= 11 && hour < 16) return 'w2'; // Siang
        if (hour >= 16 && hour < 19) return 'w3'; // Sore
        return 'w4';                             // Malam
    };

    // 2. Tentukan file berdasarkan waktu (Asumsi default awal di PC Room)
    const state = getTimeState();
    const currentPanorama = `w${state}pcroom.jpg`; // Contoh: w3pcroom.jpg

    // 3. Inisialisasi Viewer
    const viewer = pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": `assets/${currentPanorama}`, // Sesuaikan path folder lu
        "autoLoad": true,
        "autoRotate": -2, // Tambahin dikit biar cinematic pas dibuka
        "hotSpotDebug": true, 
        "hotSpots": [
            {
                "pitch": -10,
                "yaw": 30,
                "type": "info",
                "text": "Tes koordinat"
            }
        ]
  });  
         </script>
    <script src="debug.js"></script>
</body>
</html>
