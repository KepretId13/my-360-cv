<script>
    const getTimeState = () => {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 11) return 'w1';
        if (hour >= 11 && hour < 16) return 'w2';
        if (hour >= 16 && hour < 19) return 'w3';
        return 'w4';
    };

    const state = getTimeState();

    pannellum.viewer('panorama', {
        "default": {
            "firstScene": "pcroom",
            "hotSpotDebug": true, 
            "sceneFadeDuration": 1000,
            "autoLoad": true
        }, // Cukup satu kurung penutup objek "default" di sini

        "scenes": { // Hilangkan tanda "}," dan ")" yang nyasar tadi
            "pcroom": {
                "title": "PC Room",
                "panorama": `assets/panorama/pcroom/${state}.webp`, 
                "hotSpots": [
                    { "pitch": -5, "yaw": 120, "type": "scene", "text": "Ke Kamar Tidur", "sceneId": "bedroom" }
                ]
            },
            "bedroom": {
                "title": "Bedroom",
                "panorama": `assets/panorama/bedroom/${state}.webp`,
                "hotSpots": [
                    { "pitch": -5, "yaw": -30, "type": "scene", "text": "Ke Ruang Trophy", "sceneId": "tropiroom" }
                ]
            },
            "tropiroom": {
                "title": "Trophy Room",
                "panorama": `assets/panorama/tropiroom/${state}.webp`,
                "hotSpots": [
                    { "pitch": -5, "yaw": 60, "type": "scene", "text": "Ke Ruang Enchant", "sceneId": "enchantroom" }
                ]
            },
            "enchantroom": {
                "title": "Enchanting Room",
                "panorama": `assets/panorama/enchantroom/${state}.webp`,
                "hotSpots": [
                    { "pitch": -5, "yaw": 0, "type": "scene", "text": "Balik ke PC Room", "sceneId": "pcroom" }
                ]
            }
        }
    }); // Tutup fungsi viewer secara utuh di paling bawah
</script>
